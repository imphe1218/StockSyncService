services:
  stocksyncservice:
    build: .
    container_name: stocksyncservice
    ports:
      - "8080:8080"
    environment:
      STOCK_SYNC_VENDOR_A_BASE_URL: http://wiremock:8080
      STOCK_SYNC_VENDOR_B_CSV_PATH: /data/vendor-b/stock.csv
    volumes:
      - ./vendor-b:/data/vendor-b:ro
    depends_on:
      - wiremock

  wiremock:
    image: wiremock/wiremock:3.9.2
    container_name: vendor-a-wiremock
    ports:
      - "8089:8080"
    volumes:
      - ./wiremock:/home/wiremock
