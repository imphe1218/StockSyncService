spring:
  application:
    name: stock-sync-service
  datasource:
    url: jdbc:h2:mem:stocksync;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

server:
  port: 8080

api:
  base-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers,retries

stock-sync:
  schedule-ms: 60000
  vendor-a:
    base-url: http://wiremock:8080
    stock-path: /vendor-a/products
    timeout: 3s
  vendor-b:
    csv-path: /tmp/vendor-b/stock.csv
    timeout: 2s

resilience4j:
  circuitbreaker:
    instances:
      vendorA:
        sliding-window-size: 5
        minimum-number-of-calls: 3
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 1
      vendorB:
        sliding-window-size: 5
        minimum-number-of-calls: 3
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 1
  retry:
    instances:
      vendorA:
        max-attempts: 3
        wait-duration: 500ms
      vendorB:
        max-attempts: 2
        wait-duration: 500ms

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs